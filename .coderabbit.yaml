language: ko-KR

tone_instructions: >
  당신은 수면 시차 PWA 프로젝트의 프론트엔드 코드 리뷰어입니다.
  사용자가 현재 체류지, 한국, 친구의 생활 시간대와 수면 리듬을 빠르게 이해할 수 있는지 관점에서 리뷰하세요.
  피드백은 명확하고 구체적으로 작성하고, 문제의 원인과 개선 방법을 함께 제시하세요.
  React, TypeScript, Vite, Tailwind CSS, Zustand, PWA 관점의 품질과 모바일 사용성을 우선 확인하세요.
  칭찬은 짧게, 개선 제안은 실행 가능하게 작성하세요.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: false
  sequence_diagrams: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: true

  path_instructions:
    - path: src/**
      instructions: |
        1. React, TypeScript strict mode, Vite 환경을 기준으로 타입 안정성, 컴포넌트 책임 분리, 상태 관리 범위, 에러 처리, 접근성, 모바일 사용성을 중점적으로 리뷰해주세요.
        2. 수면 시간, 시간대, 날짜 변경선 계산 로직은 문자열 비교에 의존하지 않는지 확인하고, 자정을 넘는 수면 시간과 UTC offset 30분/45분 케이스를 함께 검토해주세요.
        3. 서버 상태가 필요하기 전까지는 로컬 상태와 Zustand를 우선 사용하는 프로젝트 방향에 맞는지 확인해주세요.
        4. 반복되는 UI는 작고 재사용 가능한 컴포넌트로 분리되어 있는지, 네이밍은 AGENTS.md의 컨벤션을 따르는지 확인해주세요.
        5. 리뷰 포인트마다 문제의 원인, 개선 방법, 장단점을 구체적으로 제시하고 필요한 경우 짧은 예시 코드를 추가해주세요.
        6. 리뷰 피로도를 줄이기 위해 사용자 영향이 큰 문제, 버그 가능성, 유지보수 리스크를 우선으로 코멘트해주세요.

    - path: src/features/**
      instructions: |
        1. 기능별 폴더가 화면, 상태, 유틸, 타입의 책임을 과도하게 섞지 않는지 확인해주세요.
        2. sleep-calculator, friend-map, return-plan 기능은 mock 데이터 기반으로 먼저 구현하고 이후 실제 API로 교체하기 쉬운 구조인지 검토해주세요.
        3. 로딩, 빈 상태, 에러 상태가 필요한 사용자 흐름에 빠져 있지 않은지 확인해주세요.

    - path: src/stores/**
      instructions: |
        1. Zustand store는 여러 화면에서 공유되는 클라이언트 상태에만 사용되는지 확인해주세요.
        2. persist 사용 시 저장할 데이터와 저장하지 말아야 할 임시 상태가 분리되어 있는지 검토해주세요.
        3. 액션 이름과 boolean 상태 이름이 AGENTS.md의 네이밍 컨벤션을 따르는지 확인해주세요.

    - path: src/lib/**
      instructions: |
        1. 시간대, 수면 시간, 날짜 계산 유틸은 순수 함수로 작성되어 테스트하기 쉬운지 확인해주세요.
        2. 날짜 변경선, 자정 이후 기상, UTC offset 30분/45분 단위 등 경계값 테스트가 필요한지 제안해주세요.

    - path: src/utils/**
      instructions: |
        1. 공통 유틸은 특정 화면 상태나 브라우저 API에 과하게 결합되어 있지 않은지 확인해주세요.
        2. 시간과 날짜 관련 유틸은 테스트 가능한 입력과 출력 형태를 유지하는지 검토해주세요.

    - path: src/components/**
      instructions: |
        1. 공통 컴포넌트는 재사용 가능한 props 구조와 명확한 책임을 가지는지 확인해주세요.
        2. 모바일 터치 영역, 키보드 접근성, aria 속성, 포커스 상태가 필요한 UI인지 검토해주세요.
        3. Tailwind className이 지나치게 복잡해졌다면 작은 컴포넌트나 스타일 상수로 분리할 수 있는지 제안해주세요.

    - path: public/**
      instructions: |
        1. PWA 아이콘, manifest 관련 리소스가 다양한 기기에서 깨지지 않는지 확인해주세요.
        2. 이미지와 정적 자산은 용량, 대체 텍스트 제공 가능성, 캐싱 전략 관점에서 검토해주세요.

    - path: vite.config.ts
      instructions: |
        1. Vite와 Vite PWA Plugin 설정이 PWA 설치, 오프라인 접근, 빠른 재방문 경험에 맞게 구성되어 있는지 확인해주세요.
        2. 환경 변수는 VITE_ 접두어를 사용하고, 비밀값이 클라이언트 번들에 노출되지 않는지 검토해주세요.

    - path: package.json
      instructions: |
        1. 패키지 매니저는 npm만 사용하는 프로젝트 규칙을 기준으로 의존성과 scripts를 검토해주세요.
        2. 새 의존성이 추가되었다면 실제 필요성, 번들 크기, 유지보수성, 기존 도구로 대체 가능한지 확인해주세요.

    - path: "*.md"
      instructions: |
        1. 문서는 AGENTS.md와 SKILLS.md의 프로젝트 방향, 브랜치 전략, 커밋 컨벤션과 충돌하지 않는지 확인해주세요.
        2. 사용자가 바로 실행할 수 있도록 명령어, 파일 경로, 완료 조건이 구체적인지 검토해주세요.

  auto_review:
    enabled: false
    auto_incremental_review: false

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - AGENTS.md
      - SKILLS.md
      - README.md
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
